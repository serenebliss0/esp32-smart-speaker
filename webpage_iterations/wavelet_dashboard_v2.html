
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Quicksand:wght@500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --accent:#c084b0;--accent-light:#fdf0f8;--accent-mid:#f9a8d4;
  --accent-dark:#7c3f7e;--accent-border:rgba(192,132,176,0.25);
  --card-bg:rgba(255,255,255,0.88);--page-bg:linear-gradient(135deg,#fdf0f8 0%,#f0f4ff 100%);
}
.theme-dark{--accent:#818cf8;--accent-light:#1e1b4b;--accent-mid:#6366f1;--accent-dark:#c7d2fe;--accent-border:rgba(129,140,248,0.25);--card-bg:rgba(30,27,75,0.9);--page-bg:linear-gradient(135deg,#0f0c29 0%,#1a1a2e 100%);}
.theme-monokai{--accent:#a6e22e;--accent-light:#1a1a0e;--accent-mid:#f92672;--accent-dark:#e6db74;--accent-border:rgba(166,226,46,0.25);--card-bg:rgba(39,40,34,0.95);--page-bg:linear-gradient(135deg,#272822 0%,#1a1a12 100%);}
.theme-nord{--accent:#88c0d0;--accent-light:#eceff4;--accent-mid:#81a1c1;--accent-dark:#2e3440;--accent-border:rgba(136,192,208,0.25);--card-bg:rgba(236,239,244,0.95);--page-bg:linear-gradient(135deg,#eceff4 0%,#e5e9f0 100%);}
.theme-solarized{--accent:#268bd2;--accent-light:#fdf6e3;--accent-mid:#2aa198;--accent-dark:#073642;--accent-border:rgba(38,139,210,0.25);--card-bg:rgba(253,246,227,0.95);--page-bg:linear-gradient(135deg,#fdf6e3 0%,#eee8d5 100%);}

.app{font-family:'Nunito',sans-serif;background:var(--page-bg);min-height:700px;padding:20px;}
.logo{font-family:'Quicksand',sans-serif;font-size:20px;font-weight:600;color:var(--accent);letter-spacing:2px;}
.logo span{color:var(--accent-mid);}
.card{background:var(--card-bg);border-radius:18px;border:1.5px solid var(--accent-border);padding:18px;}
.section-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}

.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.icon-btn{background:var(--card-bg);border:1.5px solid var(--accent-border);border-radius:10px;padding:7px 12px;cursor:pointer;font-size:13px;font-weight:700;color:var(--accent);font-family:'Nunito',sans-serif;transition:all 0.15s;}
.icon-btn:hover{background:var(--accent-light);}
.icon-btn.active{background:var(--accent-light);border-color:var(--accent);}

.desktop-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.desktop-grid .left{display:flex;flex-direction:column;gap:16px;}
.desktop-grid .right{display:flex;flex-direction:column;gap:16px;}

@media(max-width:640px){.desktop-grid{grid-template-columns:1fr;}}

.np-track{font-size:16px;font-weight:700;color:var(--accent-dark);margin-bottom:2px;}
.np-sub{font-size:12px;color:var(--accent);margin-bottom:14px;}
.np-meta{font-size:11px;color:var(--accent);opacity:0.7;font-style:italic;}
.progress-wrap{height:5px;background:var(--accent-light);border-radius:99px;overflow:hidden;margin-bottom:14px;}
.progress-bar{height:100%;width:0%;background:var(--accent);border-radius:99px;transition:width 0.5s linear;}
.playback{display:flex;align-items:center;justify-content:center;gap:12px;}
.ctrl-btn{background:var(--accent-light);border:1.5px solid var(--accent-border);border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all 0.15s;font-family:'Nunito',sans-serif;color:var(--accent-dark);}
.ctrl-btn:hover{background:var(--accent-border);transform:scale(1.08);}
.ctrl-btn:active{transform:scale(0.94);}
.play-btn{width:54px;height:54px;font-size:20px;background:var(--accent);border-color:transparent;color:white;}
.play-btn:hover{opacity:0.85;}

.vol-row{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.vol-icon{font-size:16px;flex-shrink:0;color:var(--accent);}
input[type=range]{flex:1;-webkit-appearance:none;height:5px;background:var(--accent-light);border-radius:99px;outline:none;border:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;border:3px solid white;}
.vol-val{font-size:13px;font-weight:700;color:var(--accent);min-width:32px;text-align:right;}

.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mode-btn{background:var(--accent-light);border:1.5px solid var(--accent-border);border-radius:12px;padding:10px 6px;cursor:pointer;text-align:center;transition:all 0.15s;font-family:'Nunito',sans-serif;}
.mode-btn:hover{transform:scale(1.02);}
.mode-btn.active{border-color:var(--accent);background:var(--accent-light);}
.mode-icon{font-size:18px;display:block;margin-bottom:3px;color:var(--accent);}
.mode-name{font-size:11px;font-weight:700;color:var(--accent-dark);}

.battery-row{display:flex;align-items:center;gap:10px;}
.battery-bar-wrap{flex:1;height:12px;background:var(--accent-light);border-radius:99px;overflow:hidden;border:1.5px solid var(--accent-border);}
.battery-bar{height:100%;border-radius:99px;background:var(--accent);transition:width 0.6s ease;}
.battery-label{font-size:13px;font-weight:700;color:var(--accent);min-width:36px;text-align:right;}

.status-text{font-size:11px;color:var(--accent);opacity:0.7;text-align:center;margin-top:16px;}
.status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#86efac;margin-right:5px;}

.theme-bar{display:flex;gap:6px;flex-wrap:wrap;}
.theme-swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.15s;}
.theme-swatch:hover,.theme-swatch.active{border-color:var(--accent-dark);transform:scale(1.15);}

.settings-panel{display:none;flex-direction:column;gap:14px;}
.settings-panel.open{display:flex;}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--accent-border);}
.setting-row:last-child{border-bottom:none;}
.setting-label{font-size:13px;font-weight:700;color:var(--accent-dark);}
.setting-sub{font-size:11px;color:var(--accent);margin-top:2px;}
.toggle{width:38px;height:22px;background:var(--accent-border);border-radius:99px;cursor:pointer;position:relative;transition:background 0.2s;border:none;flex-shrink:0;}
.toggle.on{background:var(--accent);}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:white;transition:transform 0.2s;}
.toggle.on::after{transform:translateX(16px);}
.main-view{display:flex;flex-direction:column;gap:0;}
</style>

<div class="app" id="app">
  <div class="topbar">
    <div class="logo">wave<span>let</span></div>
    <div class="topbar-right">
      <div class="theme-bar" id="theme-bar">
        <div class="theme-swatch active" data-theme="" style="background:#c084b0;" title="Pink (default)"></div>
        <div class="theme-swatch" data-theme="dark" style="background:#6366f1;" title="Dark"></div>
        <div class="theme-swatch" data-theme="monokai" style="background:#a6e22e;" title="Monokai"></div>
        <div class="theme-swatch" data-theme="nord" style="background:#88c0d0;" title="Nord"></div>
        <div class="theme-swatch" data-theme="solarized" style="background:#268bd2;" title="Solarized"></div>
      </div>
      <button class="icon-btn" id="settings-btn">settings</button>
    </div>
  </div>

  <div class="main-view" id="main-view">
    <div class="desktop-grid">
      <div class="left">
        <div class="card">
          <div class="section-label">now playing</div>
          <div class="np-track" id="np-track">Connecting...</div>
          <div class="np-sub" id="np-sub">waiting for bluetooth</div>
          <div class="np-meta" id="np-meta"></div>
          <div style="height:10px;"></div>
          <div class="progress-wrap"><div class="progress-bar" id="prog-bar"></div></div>
          <div class="playback">
            <button class="ctrl-btn" id="btn-prev">&#9664;&#9664;</button>
            <button class="ctrl-btn play-btn" id="btn-play">&#9646;&#9646;</button>
            <button class="ctrl-btn" id="btn-next">&#9654;&#9654;</button>
          </div>
        </div>

        <div class="card">
          <div class="section-label">volume</div>
          <div class="vol-row">
            <span class="vol-icon">&#128264;</span>
            <input type="range" id="vol-slider" min="0" max="127" value="90" step="1">
            <span class="vol-val" id="vol-val">71%</span>
          </div>
        </div>

        <div class="card">
          <div class="section-label">battery</div>
          <div class="battery-row">
            <span style="font-size:15px;color:var(--accent);">&#128267;</span>
            <div class="battery-bar-wrap">
              <div class="battery-bar" id="bat-bar" style="width:0%"></div>
            </div>
            <span class="battery-label" id="bat-label">--</span>
          </div>
        </div>
      </div>

      <div class="right">
        <div class="card">
          <div class="section-label">mode</div>
          <div class="mode-grid">
            <button class="mode-btn active" data-mode="0">
              <span class="mode-icon">&#128266;</span>
              <span class="mode-name">Bluetooth</span>
            </button>
            <button class="mode-btn" data-mode="1">
              <span class="mode-icon">&#10024;</span>
              <span class="mode-name">Assistant</span>
            </button>
            <button class="mode-btn" data-mode="2">
              <span class="mode-icon">&#128225;</span>
              <span class="mode-name">Wi-Fi Stream</span>
            </button>
            <button class="mode-btn" data-mode="3">
              <span class="mode-icon">&#127911;</span>
              <span class="mode-name">AUX / Jack</span>
            </button>
          </div>
        </div>

        <div class="card">
          <div class="section-label">settings</div>
          <div class="settings-panel open" id="settings-panel">
            <div class="setting-row">
              <div>
                <div class="setting-label">Device name</div>
                <div class="setting-sub">Bluetooth broadcast name</div>
              </div>
              <input type="text" value="Serenity's ESP32" id="device-name" style="width:140px;font-size:12px;padding:6px 8px;border-radius:8px;border:1.5px solid var(--accent-border);background:var(--accent-light);color:var(--accent-dark);font-family:'Nunito',sans-serif;">
            </div>
            <div class="setting-row">
              <div>
                <div class="setting-label">Startup sound</div>
                <div class="setting-sub">Play chime on boot</div>
              </div>
              <button class="toggle on" id="toggle-startup"></button>
            </div>
            <div class="setting-row">
              <div>
                <div class="setting-label">Connection buzz</div>
                <div class="setting-sub">Buzz when BT connects</div>
              </div>
              <button class="toggle on" id="toggle-buzz"></button>
            </div>
            <div class="setting-row">
              <div>
                <div class="setting-label">Debug mode</div>
                <div class="setting-sub">Serial logging</div>
              </div>
              <button class="toggle" id="toggle-debug"></button>
            </div>
            <div class="setting-row">
              <div>
                <div class="setting-label">Auto-reconnect</div>
                <div class="setting-sub">Reconnect last BT device</div>
              </div>
              <button class="toggle on" id="toggle-reconnect"></button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="status-text"><span class="status-dot"></span>wavelet.local &mdash; <span id="conn-status">connecting...</span></div>
  </div>
</div>

<script>
const BASE = '';

function applyTheme(t){
  document.getElementById('app').className='app '+(t?'theme-'+t:'');
  document.querySelectorAll('.theme-swatch').forEach(s=>s.classList.toggle('active',s.dataset.theme===t));
}
document.getElementById('theme-bar').addEventListener('click',e=>{
  const s=e.target.closest('.theme-swatch');
  if(s) applyTheme(s.dataset.theme);
});

const volSlider=document.getElementById('vol-slider');
const volVal=document.getElementById('vol-val');
function updateSlider(){
  const pct=Math.round((volSlider.value/127)*100);
  volVal.textContent=pct+'%';
}
volSlider.addEventListener('input',()=>{
  updateSlider();
  fetch(BASE+'/volume?v='+volSlider.value).catch(()=>{});
});
updateSlider();

document.querySelectorAll('.mode-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    fetch(BASE+'/mode?m='+btn.dataset.mode).catch(()=>{});
  });
});

let playing=true;
const playBtn=document.getElementById('btn-play');
const progBar=document.getElementById('prog-bar');
playBtn.addEventListener('click',()=>{
  playing=!playing;
  playBtn.innerHTML=playing?'&#9646;&#9646;':'&#9654;';
  fetch(BASE+(playing?'/play':'/pause')).catch(()=>{});
});
document.getElementById('btn-next').addEventListener('click',()=>fetch(BASE+'/next').catch(()=>{}));
document.getElementById('btn-prev').addEventListener('click',()=>fetch(BASE+'/previous').catch(()=>{}));

document.querySelectorAll('.toggle').forEach(t=>{
  t.addEventListener('click',()=>t.classList.toggle('on'));
});

async function pollNowPlaying(){
  try{
    const r=await fetch(BASE+'/nowplaying');
    if(r.ok){
      const d=await r.json();
      document.getElementById('np-track').textContent=d.track||'Nothing playing';
      document.getElementById('np-sub').textContent=d.artist||'connected via bluetooth';
      document.getElementById('conn-status').textContent='connected';
      if(d.track&&d.track!=='Nothing playing'){
        progBar.style.transition='width 0.5s linear';
        if(progBar.style.width==='0%') progBar.style.width='15%';
      }
    }
  }catch(e){
    document.getElementById('conn-status').textContent='offline (demo mode)';
  }
}

async function pollBattery(){
  try{
    const r=await fetch(BASE+'/battery');
    if(r.ok){
      const pct=Math.min(100,Math.max(0,Math.round(parseInt(await r.text()))));
      document.getElementById('bat-bar').style.width=pct+'%';
      document.getElementById('bat-label').textContent=pct+'%';
    }
  }catch(e){
    document.getElementById('bat-label').textContent='--';
  }
}

pollNowPlaying();
pollBattery();
setInterval(pollNowPlaying,3000);
setInterval(pollBattery,5000);
</script>

; ==================================================
; Common Settings
; ==================================================

[env]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino

board_build.partitions = min_spiffs.csv

build_flags =
    -D CONFIG_ASYNC_TCP_TASK_STACK_SIZE=4096
    -D CONFIG_ASYNC_TCP_RUNNING_CORE=1
    -D CONFIG_ESP32_WIFI_SW_COEXIST_ENABLE=1

lib_deps =
    https://github.com/pschatzmann/ESP32-A2DP.git
    mathieucarbou/ESP Async WebServer @ ^3.0.6

; ==================================================
; Wavelet Mini
; ==================================================

[env:mini]
extends = env

build_flags =
    ${env.build_flags}
    -DWAVELET_MINI
    -DFEATURE_DISPLAY
    -DFEATURE_BATTERY

; ==================================================
; Wavelet Regular
; ==================================================

[env:regular]
extends = env

build_flags =
    ${env.build_flags}
    -DWAVELET_REGULAR
    -DFEATURE_BATTERY

; ==================================================
; Wavelet Max
; ==================================================

[env:max]
extends = env

build_flags =
    ${env.build_flags}
    -DWAVELET_MAX
    -DFEATURE_WIFI
    -DFEATURE_DISPLAY
    -DFEATURE_ASSISTANT
    -DFEATURE_DLNA
    -DFEATURE_BATTERY